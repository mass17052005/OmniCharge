spring.application.name=notification-service
spring.cloud.config.enabled=false

server.port=8085
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.webclient.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3306/omnicharge_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Aditya@18
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.jwt.secret=omnicharge-secret-key-must-be-at-least-32-chars-long
app.jwt.expiration=86400000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=*